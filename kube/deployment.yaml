apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-frontend-search
  namespace: core-frontend
  labels:
    app: core-frontend-search
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: core-frontend-search
  template:
    metadata:
      labels:
        app: core-frontend-search
    spec:
      terminationGracePeriodSeconds: 60
      nodeSelector:
        agentpool: userpool
      securityContext: 
        sysctls:
          - name: net.ipv4.tcp_tw_reuse
            value: "1"
          - name: net.ipv4.ip_local_port_range
            value: "1024 65535"
      containers:
        - name: core-frontend-search
          image: ${IMAGE}
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
          envFrom:
            - secretRef:
                name: core-frontend-search-secrets
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 1000m
              memory: 768Mi
            limits:
              cpu: 2000m
              memory: 1500Mi
