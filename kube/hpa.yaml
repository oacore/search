apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: core-frontend-search
  namespace: core-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: core-frontend-search
  minReplicas: 4                     
  maxReplicas: 20                     
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60          
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0       
      policies:
        - type: Percent
          value: 100          
          periodSeconds: 15
        - type: Pods
          value: 4                    
          periodSeconds: 15
      selectPolicy: Max                 
    scaleDown:
      stabilizationWindowSeconds: 300  
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120