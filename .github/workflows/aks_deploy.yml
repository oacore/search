name: AKS deployment - core-frontend-search

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  ACR_NAME: corecontainers
  IMAGE_NAME: core-frontend-search
  RESOURCE_GROUP: core-frontend
  AKS_CLUSTER_NAME: core-frontend-kubernetes-cluster
  NAMESPACE: core-frontend
  DEPLOYMENT_NAME: core-frontend-search

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    environment: azure
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image reference
        id: image
        run: |
          TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "ref=${{ env.ACR_NAME }}.azurecr.io/aks-${{ env.IMAGE_NAME }}:$TAG" >> $GITHUB_OUTPUT

      - name: Docker ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build and push
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            --build-arg NPM_TOKEN=${{ secrets.NPM_TOKEN }} \
            --build-arg GA_TRACKING_CODE=${{ secrets.GA_TRACKING_CODE }} \
            --build-arg API_KEY=${{ secrets.API_KEY }} \
            --build-arg SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --build-arg ICONS_PUBLIC_PATH=${{ secrets.ICONS_PUBLIC_PATH }} \
            -t ${{ steps.image.outputs.ref }} .

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --admin \
            --overwrite-existing

      - name: Sync secrets to AKS
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }} 
          GA_TRACKING_CODE: ${{ secrets.GA_TRACKING_CODE }} 
          API_KEY: ${{ secrets.API_KEY }} 
          ICONS_PUBLIC_PATH: ${{ secrets.ICONS_PUBLIC_PATH }} 
        run: |
          kubectl create secret generic core-frontend-search-secrets \
            --namespace core-frontend \
            --from-literal=NPM_TOKEN="${{ env.NPM_TOKEN }}" \
            --from-literal=GA_TRACKING_CODE="${{ secrets.GA_TRACKING_CODE }}" \
            --from-literal=API_KEY="${{ secrets.API_KEY }}" \
            --from-literal=ICONS_PUBLIC_PATH="${{ secrets.ICONS_PUBLIC_PATH }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kube/service.yaml
          kubectl apply -f kube/httproute.yaml
          kubectl apply -f kube/hpa.yaml
          kubectl apply -f kube/pdb.yaml


      - name: Deploy to AKS
        run: |
          export IMAGE="${{ steps.image.outputs.ref }}"
          envsubst '${IMAGE}' < kube/deployment.yaml | \
            kubectl apply --server-side --force-conflicts -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=300s
